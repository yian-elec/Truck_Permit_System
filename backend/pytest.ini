[pytest]
# Project imports use `shared`, `src.contexts.*` from backend root.
pythonpath = .
testpaths = shared/tests
# Do not treat `_legacy/shared` as the top-level `shared` package (shadows backend/shared).
norecursedirs = _legacy .git .venv __pycache__ htmlcov *.egg build dist
python_files = test_*.py *_test.py run_*_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov=shared
    --cov-report=term-missing
    --cov-report=html:htmlcov
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    iam_infra: IAM context infra integration (PostgreSQL)
    iam_app: IAM context application-layer integration (PostgreSQL + Use Case Services)
    iam_e2e: IAM API E2E (PostgreSQL + TestClient)
